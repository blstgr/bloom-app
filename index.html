<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloom Storybook</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 40px; color: #2e2b28; }
      .card { max-width: 720px; padding: 24px; border: 1px solid #ddd; border-radius: 16px; }
      code { background: #f5f5f5; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Bloom React Native Storybook</h1>
      <p>This repository uses React Native Storybook (on-device), not web Storybook.</p>
      <p>Run locally:</p>
      <ul>
        <li><code>npm run storybook:start</code></li>
        <li><code>npm run storybook:ios</code></li>
      </ul>
    </div>
  </body>
</html>
